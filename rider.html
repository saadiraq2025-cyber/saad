<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الراكب - تكسي العراق الشامل</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>
body {
    margin:0;
    padding:0;
    background:#e3f3ff;
    font-family: Tahoma;
}

#map {
    height: 55vh;
    width: 100%;
}

#panel {
    background:#fff;
    margin:10px;
    padding:15px;
    border-radius:15px;
    box-shadow:0 3px 8px rgba(0,0,0,0.2);
    text-align:center;
}

/* الأزرار */
button{
    width:100%;
    padding:12px;
    margin:5px 0;
    border:none;
    font-size:18px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.green-btn{ background:#00e676; }
.yellow-btn{ background:#ffeb3b; }
.red-btn{ background:#f44336; color:#fff; }
.purple-btn{ background:#7e57c2; color:#fff; }
.blue-btn{ background:#2196f3; color:#fff; }
.black-btn{ background:#000; color:#fff; }

/* الشات */
#chatBox{
    margin-top:15px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:10px;
    background:#f9f9f9;
}

#messages{
    height:120px;
    overflow-y:auto;
    background:#fff;
    padding:10px;
    border-radius:6px;
    border:1px solid #ddd;
}
.rider-msg{ background:#d1faff; margin:4px; padding:6px; border-radius:5px; }
.driver-msg{ background:#fff9c4; margin:4px; padding:6px; border-radius:5px; }
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">

    <!-- واجهة قبل إرسال الطلب -->
    <div id="beforeRide">
        <h3>🚖 طلب رحلة جديدة</h3>
        <p id="statusText">يتم تحديد موقعك...</p>

        <input id="destinationInput" type="text" placeholder="ادخل نقطة النهاية" style="width:100%;padding:12px;border-radius:6px;border:1px solid #ccc;">

        <button id="searchBtn" class="green-btn">بحث عن مكان</button>
        <button id="sendRequest" class="yellow-btn" disabled>إرسال طلب</button>
    </div>

    <!-- واجهة بعد قبول الرحلة -->
    <div id="afterRide" style="display:none;">

        <button class="green-btn">بحث عن مكان</button>
        <button class="yellow-btn">إرسال طلب</button>

        <h3>طلب رحلة جديدة 🚖</h3>
        <p>من: <span id="fromArea">---</span></p>
        <p>إلى: <span id="toArea">---</span></p>
        <p>المسافة: <b id="distanceText">--</b> كم</p>
        <p>الأجرة: <b id="fareText">--</b> د.ع</p>

        <button id="endRide" class="red-btn">إنهاء الرحلة</button>

        <button class="purple-btn">حل مشكلة</button>
        <button id="openChat" class="blue-btn">إرسال</button>

        <button class="black-btn" onclick="logout()">تسجيل خروج</button>
    </div>

    <!-- الشات -->
    <div id="chatBox" style="display:none;">
        <h4>💬 الدردشة</h4>
        <div id="messages"></div>

        <input type="text" id="msgInput" placeholder="اكتب رسالتك..." style="width:70%;padding:10px;border-radius:5px;border:1px solid #ccc;">
        <button id="sendMsg" style="width:25%;padding:10px;background:#2196f3;color:#fff;border-radius:5px;">إرسال</button>
    </div>

</div>

<script>
// بيانات المستخدم
const phone = localStorage.getItem("phone");
if(!phone) window.location.href="index.html";

// Firebase
const app = firebase.initializeApp({
    apiKey:"AIzaSyBZy7GTKn62CqeXAgm2fLrXI67P4Lc4Q3M",
    databaseURL:"https://taxi-15314-default-rtdb.firebaseio.com/"
});
const db = firebase.database();

let map = L.map('map').setView([33.3152,44.3661],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let startCoords=null, endCoords=null;
let rideId=null;

// تحديد موقع الراكب
navigator.geolocation.getCurrentPosition(pos=>{
    startCoords = [pos.coords.latitude, pos.coords.longitude];
    L.marker(startCoords).addTo(map).bindPopup("موقعك").openPopup();
},()=>{}, {enableHighAccuracy:true});

// بحث
document.getElementById("searchBtn").onclick = ()=>{
    let q = document.getElementById("destinationInput").value.trim();
    if(q==="") return alert("ادخل العنوان");

    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`)
    .then(r=>r.json())
    .then(data=>{
        if(data.length===0) return alert("لم يتم العثور");

        endCoords = [data[0].lat, data[0].lon];
        L.marker(endCoords).addTo(map);
        document.getElementById("sendRequest").disabled=false;
    });
};

// إرسال الطلب
document.getElementById("sendRequest").onclick = ()=>{
    rideId = Date.now();
    localStorage.setItem("activeRideId", rideId);

    db.ref("rides/"+rideId).set({
        rider: phone,
        start: startCoords,
        end: endCoords,
        distance: "0.8",
        fare: 5000,
        status: "جديدة"
    });

    showAcceptedUI();
};

// قبول الرحلة (عرض واجهة الصورة)
function showAcceptedUI(){
    document.getElementById("beforeRide").style.display="none";
    document.getElementById("afterRide").style.display="block";
}

// إنهاء الرحلة
document.getElementById("endRide").onclick = ()=>{
    if(!rideId) return;
    db.ref("rides/"+rideId).update({ status:"منتهية" });
    alert("تم إنهاء الرحلة");
    location.reload();
};

// الشات
document.getElementById("openChat").onclick = ()=>{
    document.getElementById("chatBox").style.display="block";
};

document.getElementById("sendMsg").onclick = ()=>{
    let txt = document.getElementById("msgInput").value.trim();
    if(txt==="") return;

    db.ref("chat/"+rideId).push({
        from:"rider",
        text:txt
    });

    document.getElementById("msgInput").value="";
};

// logout
function logout(){
    localStorage.clear();
    location.href="index.html";
}
</script>

</body>
</html>

<script>
// منع خروج المستخدم — يبقى مسجل حتى لو غلق المتصفح
window.onload = function () {
    let phone = localStorage.getItem("phone");
    let userType = localStorage.getItem("userType");

    // إذا لم يوجد مستخدم يرجع مباشرة لصفحة الدخول
    if (!phone || !userType) {
        window.location.href = "index.html"; // صفحة تسجيل الدخول
        return;
    }

    // توجيه حسب نوع المستخدم
    if (userType === "driver" && window.location.pathname.indexOf("driver") === -1) {
        window.location.href = "driver.html";
    }

    if (userType === "rider" && window.location.pathname.indexOf("rider") === -1) {
        window.location.href = "rider.html";
    }
}
</script>

<script type="module" src="app.js"></script>

<script>
// ** ⬅️ دالة تسجيل الخروج **
window.logout = function() {
    localStorage.removeItem('phone');
    localStorage.removeItem('userType');
    // **التعديل:** إزالة أي رحلة نشطة قبل تسجيل الخروج
    localStorage.removeItem('activeRideId');
    window.location.href = "index.html";
};
// ----------------------------------------

// 🚨 التحقق من جلسة الدخول (يجب أن يكون أول شيء)
const userPhone = localStorage.getItem('phone');
const userType = localStorage.getItem('userType');

if (!userPhone || userType !== 'rider') {
    alert("❌ يجب تسجيل الدخول كراكب للوصول لهذه الصفحة.");
    window.location.href = "index.html";
}
// ----------------------------------------

// تهيئة Firebase
const app=firebase.initializeApp({
  apiKey:"AIzaSyBZy7GTKn62CqeXAgm2fLrXI67P4Lc4Q3M",
  authDomain:"taxi-15314.firebaseapp.com",
  databaseURL:"https://taxi-15314-default-rtdb.firebaseio.com/",
  projectId:"taxi-15314"
});
const db=firebase.database();

let map=L.map('map').setView([33.3152,44.3661],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
// 💡 الحل لمشكلة الخريطة في متصفحات iOS (يضمن إعادة تحجيمها بعد التهيئة)
map.whenReady(function() { 
    map.invalidateSize(); 
});


let startCoords=null,endCoords=null;
let startMarker=null,endMarker=null;
let rideId=null;

// ** 🆕 متغيرات متابعة السائق (تعديل جديد) **
let driverMarker = null; // علامة موقع السائق
let driverLocationRef = null; // مرجع Firebase لموقع السائق
// ------------------------------------------

// العناصر الجديدة
const sendBtn = document.getElementById("sendRide");
const endBtn = document.getElementById("cancelRideBtn");

// 💬 عناصر الشات
const chatBox = document.getElementById('chatBox');
const messagesDiv = document.getElementById('messages');
const messageInput = document.getElementById('messageInput');
const sendMsgBtn = document.getElementById('sendMsgBtn');
let chatRef = null;

// 🆕 عناصر ومنطق البحث
const searchInput = document.getElementById('searchInput');
const searchResultsUl = document.getElementById('searchResults');
const searchContainer = document.getElementById('searchContainer'); // للحصول على الحاوية
const SEARCH_DELAY = 500; // تأخير البحث بالمللي ثانية
let searchTimer = null; 

// 🆕 دالة البحث في Nominatim (تستخدم OpenStreetMap)
function searchLocation(query) {
    if (query.length < 3) {
        searchResultsUl.innerHTML = '';
        searchResultsUl.style.display = 'none';
        return;
    }
    
    // 💡 إضافة 'بغداد, العراق' كافتراضي لتحسين دقة النتائج
    const fullQuery = `${query}, بغداد, العراق`; 
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(fullQuery)}&format=json&limit=5&addressdetails=1&accept-language=ar`;

    fetch(url)
        .then(response => response.json())
        .then(data => {
            searchResultsUl.innerHTML = '';
            if (data.length > 0) {
                data.forEach(item => {
                    const li = document.createElement('li');
                    // عرض اسم المكان مع المدينة أو العنوان الأهم
                    li.innerText = item.display_name.split(',').slice(0, 3).reverse().join(', '); 
                    li.setAttribute('data-lat', item.lat);
                    li.setAttribute('data-lng', item.lon);
                    li.onclick = () => selectSearchResult(item.lat, item.lon, item.display_name);
                    searchResultsUl.appendChild(li);
                });
                searchResultsUl.style.display = 'block';
            } else {
                searchResultsUl.innerHTML = '<li>لا توجد نتائج مطابقة.</li>';
                searchResultsUl.style.display = 'block';
            }
        })
        .catch(error => {
            console.error('Search error:', error);
            searchResultsUl.innerHTML = '<li>حدث خطأ في البحث.</li>';
            searchResultsUl.style.display = 'block';
        });
}

// 🆕 دالة اختيار نتيجة البحث
function selectSearchResult(lat, lng, name) {
    // 1. إخفاء وإفراغ قائمة النتائج
    searchResultsUl.innerHTML = '';
    searchResultsUl.style.display = 'none';
    searchInput.value = name.split(',').slice(0, 3).reverse().join(', '); // تحديث حقل البحث

    // 2. تحديث نقطة النهاية على الخريطة
    const latlng = L.latLng(parseFloat(lat), parseFloat(lng));
    if(endMarker){map.removeLayer(endMarker);}
    endCoords = [latlng.lat, latlng.lng];
    endMarker = L.marker(endCoords).addTo(map).bindPopup(`🏁 نقطة النهاية: ${name}`).openPopup();
    map.setView(endCoords, 15); // نقل عرض الخريطة إلى النقطة المحددة

    // 3. تحديث حالة الـ panel
    if (!rideId) { 
        document.getElementById("status").innerText="تم تحديد النهاية من البحث. يمكنك الآن إرسال الطلب.";
        sendBtn.disabled=false;
    } else {
        document.getElementById("status").innerText="لديك رحلة نشطة بالفعل. لا يمكنك طلب رحلة جديدة.";
        sendBtn.disabled=true;
    }
}

// 🆕 ربط حقل البحث بالدالة مع خاصية التأخير
searchInput.addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
        searchLocation(e.target.value.trim());
    }, SEARCH_DELAY);
});

// 🆕 إغلاق النتائج عند النقر خارجها
document.addEventListener('click', (e) => {
    if (!searchContainer.contains(e.target) && searchResultsUl.style.display === 'block') {
        searchResultsUl.style.display = 'none';
    }
});
// ----------------------------------------


// ** 🆕 دالة فحص الرحلة النشطة عند تحميل الصفحة **
function checkActiveRide() {
    const storedRideId = localStorage.getItem('activeRideId');
    if (storedRideId) {
        rideId = storedRideId;
        document.getElementById("status").innerHTML = "لديك رحلة نشطة قيد المتابعة. يتم جلب حالتها...";
        sendBtn.disabled = true; // تعطيل زر الإرسال إذا كان هناك رقم رحلة مخزّن
        listenForUpdates();
    } else {
        sendBtn.disabled = true; // يبقى معطّلاً حتى يتم تحديد نقطة النهاية 
    }
}
// ----------------------------------------

// 📍 تحديد الموقع الحالي - تم إضافة خيارات قوية لـ iOS
navigator.geolocation.getCurrentPosition(pos=>{
  startCoords=[pos.coords.latitude,pos.coords.longitude];
  startMarker=L.marker(startCoords).addTo(map).bindPopup("📍 موقعك الحالي").openPopup();
  map.setView(startCoords,15);
  document.getElementById("status").innerText="انقر على الخريطة أو استخدم شريط البحث لتحديد نقطة النهاية.";
  
  // **التعديل الجديد:** فحص حالة الرحلة عند تحميل الصفحة بعد تحديد الموقع
  checkActiveRide(); 
  
},err=>{
  document.getElementById("status").innerText="⚠️ لم يتم تحديد الموقع الحالي، يرجى تفعيل الموقع في إعدادات الجهاز والسماح للتطبيق بالوصول إليه (خاصة في متصفح كروم على iOS).";
},{enableHighAccuracy:true,timeout:10000,maximumAge:0}); // خيارات قوية

// ** 🗺️ منطق النقر على الخريطة لتحديد نقطة الوصول **
map.on('click',function(e){
  // 🆕 إفراغ حقل البحث عند النقر على الخريطة
  searchInput.value = ''; 
  searchResultsUl.innerHTML = '';
  searchResultsUl.style.display = 'none';
    
  if(endMarker){map.removeLayer(endMarker);}
  endCoords=[e.latlng.lat,e.latlng.lng];
  endMarker=L.marker(endCoords).addTo(map).bindPopup("🏁 نقطة النهاية").openPopup();
  
  // **التعديل:** تمكين الزر فقط إذا لم يكن هناك رقم رحلة نشط 
  if (!rideId) { 
    document.getElementById("status").innerText="تم تحديد نقطة الوصول بالنقر على الخريطة. يمكنك الآن إرسال الطلب."; // ⬅️ تعديل بسيط في النص
    sendBtn.disabled=false;
  } else {
    document.getElementById("status").innerText="لديك رحلة نشطة بالفعل. لا يمكنك طلب رحلة جديدة.";
    sendBtn.disabled=true;
  }
});

sendBtn.onclick=function(){
  if(!startCoords || !endCoords){alert("⚠️ يرجى تحديد الموقع والنهاية.");return;}
  // **الحماية الإضافية:** منع الإرسال إذا كان هناك رقم رحلة نشط بالفعل
  if(rideId){alert("⚠️ لديك رحلة نشطة بالفعل، يرجى إنهائها قبل طلب رحلة جديدة.");return;} 
  
  const phone=userPhone||"غير معروف";

  const R=6371;
  const dLat=(endCoords[0]-startCoords[0])*Math.PI/180;
  const dLon=(endCoords[1]-startCoords[1])*Math.PI/180;
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+
           Math.cos(startCoords[0]*Math.PI/180)*Math.cos(endCoords[0]*Math.PI/180)*
           Math.sin(dLon/2)*Math.sin(dLon/2);
  const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  const distance=(R*c).toFixed(2);
  const fare=Math.round(distance*1000);

  rideId=Date.now();
  // **التعديل:** حفظ رقم الرحلة في LocalStorage
  localStorage.setItem('activeRideId', rideId); 
  
  firebase.database().ref("rides/"+rideId).set({
    riderPhone:phone,
    start:startCoords,
    end:endCoords,
    distance:distance,
    fare:fare,
    status:"جديدة"
  }).then(()=>{
    document.getElementById("status").innerHTML=
      `✅ تم إرسال الطلب<br>المسافة: <b>${distance}</b> كم — الأجرة: <b>${fare}</b> د.ع<br>بإنتظار السائق...`;
    sendBtn.disabled = true; // تعطيل الزر فور الإرسال
    listenForUpdates();
  }).catch(err=>{
    document.getElementById("status").innerText="❌ حدث خطأ أثناء الإرسال: "+err;
  });
};

// 💬 منطق الشات - وظيفة إرسال الرسائل
function sendMessage(senderType) {
    const text = messageInput.value.trim();
    if (text === "") return;
    
    if (!chatRef) {
        alert("⚠️ لا يمكن إرسال الرسالة: لم يتم قبول الرحلة بعد أو تم إنهاؤها.");
        return;
    }

    chatRef.push({
        sender: senderType, // 'rider'
        text: text,
        timestamp: Date.now()
    }).then(() => {
        messageInput.value = '';
    }).catch(error => {
        alert("❌ فشل إرسال الرسالة: " + error.message + " (تحقق من قواعد أمان Firebase)");
    });
}

// 💬 منطق الشات - وظيفة الاستماع للرسائل
function listenForChatMessages() {
    if(chatRef) chatRef.off('child_added'); 

    chatRef.on('child_added', (snap) => {
        const message = snap.val();
        const p = document.createElement('p');
        // هنا نعكس نمط الرسائل لتظهر رسالة الراكب على اليسار
        p.className = (message.sender === 'rider') ? 'rider-msg' : 'driver-msg';
        p.innerText = message.text;
        messagesDiv.appendChild(p);
        messagesDiv.scrollTop = messagesDiv.scrollHeight; 
    });
}

// ** ربط زر الإرسال وEnter بمهمة إرسال الرسالة **
sendMsgBtn.addEventListener('click', () => sendMessage('rider'));
messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        sendMessage('rider');
    }
});
// ------------------------------------------------

// 🔹 مراقبة التحديثات
function listenForUpdates(){
  if(!rideId) return;
  // إيقاف أي استماع سابق
  firebase.database().ref("rides/"+rideId).off("value");

  firebase.database().ref("rides/"+rideId).on("value",snapshot=>{
    const ride=snapshot.val();
    if(!ride) {
        document.getElementById("status").innerHTML = `❌ تم إلغاء الرحلة. يمكنك طلب رحلة جديدة.`;
        resetRiderState();
        return;
    }

    // **التعديل:** التأكد من تعطيل الزر طالما الرحلة قيد التشغيل/الانتظار
    sendBtn.disabled = true; 
    
    if(ride.status==="مقبولة"){
      const driverPhoneNumber = ride.driverPhone || ride.assignedDriver || "غير متوفر";
      
      // *** التعديل: إظهار رقم السائق بدلاً من زر الاتصال ***
      document.getElementById("status").innerHTML=`
        🚕 السائق في الطريق إليك...<br>المسافة: ${ride.distance} كم<br>الأجرة: ${ride.fare} د.ع<br>
        رقم السائق: <b><a href="tel:${driverPhoneNumber}">${driverPhoneNumber}</a></b>
      `;
      // ******************************************************
      
      endBtn.style.display = 'inline-block';
      
      // ********** إظهار صندوق الدردشة وإعداده **********
      chatBox.style.display = 'block';
      if(!chatRef) { 
        chatRef = db.ref("chats/" + rideId); 
        listenForChatMessages(); 
      }
      // ************************************************
      
      // ** 🗺️ منطق متابعة موقع السائق (التعديل الجديد) **
      const driverId = ride.assignedDriver; // نفترض أن 'assignedDriver' يحتوي على رقم الهاتف/المعرف
      if (driverId && !driverLocationRef) {
          // 1. تحديد المرجع لموقع السائق
          driverLocationRef = db.ref(`driverLocations/${driverId}/location`);
          
          // 2. الاستماع لتحديثات الموقع
          driverLocationRef.on('value', (locSnapshot) => {
              const location = locSnapshot.val();
              if (location && Array.isArray(location) && location.length === 2) {
                  const [lat, lng] = location;
                  
                  // 3. تحديث موقع العلامة إذا كانت موجودة
                  if (driverMarker) {
                      driverMarker.setLatLng([lat, lng]);
                  } else {
                      // 4. إنشاء علامة السائق لأول مرة (استخدام أيقونة مميزة)
                      const driverIcon = L.icon({
                          iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-gold.png',
                          shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                          iconSize: [25, 41],
                          iconAnchor: [12, 41],
                          popupAnchor: [1, -34],
                          shadowSize: [41, 41]
                      });
                      driverMarker = L.marker([lat, lng], { icon: driverIcon }).addTo(map)
                          .bindPopup("🚕 موقع السائق الحالي").openPopup();
                  }
              }
          });
      }
      // *********************************************************

      endBtn.onclick = () => {
          if (confirm("هل أنت متأكد من إنهاء/إلغاء الرحلة؟")) {
              firebase.database().ref("rides/" + rideId).update({
                  status: "ملغاة من الراكب",
                  notification: "❌ الراكب ألغى الرحلة"
              }).then(() => {
                  alert("تم إلغاء الرحلة بنجاح.");
                  resetRiderState();
                  document.getElementById("status").innerText = "تم إلغاء الطلب. يمكنك طلب رحلة جديدة.";
              });
          }
      };
      
    } else if (ride.status === "منتهية" || ride.status === "ملغاة من الراكب" || ride.status === "مرفوضة") {
        let msg = '';
        if(ride.status === "منتهية") msg = '🚗 تم إنهاء الرحلة — شكرًا لاستخدامك تكسي العراق الشامل';
        if(ride.status === "ملغاة من الراكب") msg = '❌ تم إلغاء الرحلة بواسطتك.';
        if(ride.status === "مرفوضة") msg = '❌ السائق رفض الرحلة. يمكنك المحاولة مجدداً.';
        
        document.getElementById("status").innerHTML = msg;
        if(ride.status === "منتهية") alert("🚗 تم إنهاء الرحلة بنجاح!");
        
        resetRiderState(); // ستعيد تمكين زر الإرسال
    }
  });
}

// دالة مساعدة لإعادة تهيئة حالة الراكب
function resetRiderState() {
    endBtn.style.display = 'none';
    sendBtn.disabled = false; // ** 🎯 تمكين زر الإرسال للرحلة الجديدة **
    
    // 💬 إيقاف الشات
    chatBox.style.display = 'none';
    messagesDiv.innerHTML = '';
    if(chatRef) chatRef.off();
    chatRef = null;
    // -------------------
    
    // ** 🛑 إيقاف متابعة موقع السائق (التعديل الجديد) **
    if(driverLocationRef) driverLocationRef.off();
    if(driverMarker) map.removeLayer(driverMarker);
    driverLocationRef = null;
    driverMarker = null;
    // -------------------
    
    // **التعديل:** إزالة رقم الرحلة من LocalStorage
    localStorage.removeItem('activeRideId');

    rideId = null; 
    
    // تنظيف واجهة البحث
    searchInput.value = '';
    searchResultsUl.innerHTML = '';
    searchResultsUl.style.display = 'none';
}

// ============================================
// 📣 قسم استقبال الإشعارات من الأدمن
// ============================================
// التأكد من أن db و userPhone تم تعريفهما في الأعلى
if(userPhone) {
    db.ref("notifications/" + userPhone).on("value", snap => {
        const data = snap.val();
        if (data && data.message) {
            // عرض الرسالة
            alert("📣 رسالة من الإدارة:\n\n" + data.message);
            
            // حذف الإشعار لعدم تكرار ظهوره عند التحديث
            db.ref("notifications/" + userPhone).remove();
        }
    });
}
// ============================================

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة من سيربح المليون</title>
    <style>
        body {
            background-color: #000033;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #game-container {
            width: 90%;
            max-width: 600px;
            text-align: center;
            border: 2px solid #ffd700;
            padding: 20px;
            border-radius: 15px;
            background: linear-gradient(145deg, #000066, #000022);
        }
        .question-box {
            font-size: 24px;
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #555;
            border-radius: 10px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            background: #000033;
            color: white;
            border: 1px solid #ffd700;
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 25px;
            transition: 0.3s;
        }
        button:hover { background: #ffd700; color: black; }
        .helpers { margin-top: 20px; }
        .helper-btn { background: #b8860b; font-size: 14px; }
        #status { margin-top: 20px; color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="level-info">السؤال: 1 / 20 | الجائزة: 100 ريال</div>
    <div class="question-box" id="question">جاري التحميل...</div>
    <div class="options-grid" id="options">
        </div>
    <div class="helpers">
        <button class="helper-btn" id="btn-50" onclick="use5050()">مساعدة 50/50</button>
        <button class="helper-btn" onclick="withdraw()">انسحاب</button>
    </div>
    <div id="status"></div>
</div>

<script>
    const questions = [
        { q: "ما هي عاصمة العراق؟", a: ["البصرة", "بغداد", "الموصل", "أربيل"], correct: 1 },
        { q: "ما هو أكبر محيط في العالم؟", a: ["الأطلسي", "الهندي", "الهادي", "المتجمد"], correct: 2 },
        { q: "من هو مخترع الهاتف؟", a: ["إديسون", "نيوتن", "جراهام بيل", "أينشتاين"], correct: 2 },
        { q: "ما هو الكوكب الأحمر؟", a: ["الزهرة", "المريخ", "زحل", "عطارد"], correct: 1 },
        { q: "كم عدد ألوان قوس قزح؟", a: ["5", "6", "7", "8"], correct: 2 },
        // ... أضف المزيد من الأسئلة هنا لتصل إلى 20
    ];

    // تكملة تلقائية لـ 20 سؤالاً للغرض التجريبي
    while(questions.length < 20) {
        questions.push({ q: "سؤال تجريبي رقم " + (questions.length + 1), a: ["خيار صحيح", "خطأ", "خطأ", "خطأ"], correct: 0 });
    }

    const moneySteps = [100, 200, 300, 500, 1000, 2000, 4000, 8000, 16000, 32000, 64000, 125000, 250000, 500000, 1000000, 2000000, 5000000, 10000000, 50000000, 100000000];
    
    let currentStep = 0;
    let score = 0;

    function loadQuestion() {
        const qData = questions[currentStep];
        document.getElementById("level-info").innerText = `السؤال: ${currentStep + 1} / 20 | الجائزة: ${moneySteps[currentStep]} ريال`;
        document.getElementById("question").innerText = qData.q;
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        
        qData.a.forEach((opt, index) => {
            const btn = document.createElement("button");
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index);
            optionsDiv.appendChild(btn);
        });
        document.getElementById("status").innerText = "";
    }

    function checkAnswer(index) {
        if (index === questions[currentStep].correct) {
            score = moneySteps[currentStep];
            currentStep++;
            if (currentStep < 20) {
                document.getElementById("status").innerText = "إجابة صحيحة! ننتقل للسؤال التالي...";
                setTimeout(loadQuestion, 1000);
            } else {
                alert("مبروك! لقد فزت بالمليار!");
                location.reload();
            }
        } else {
            alert("للأسف إجابة خاطئة. انتهت اللعبة!");
            location.reload();
        }
    }

    function use5050() {
        const correct = questions[currentStep].correct;
        const buttons = document.getElementById("options").children;
        let removed = 0;
        for (let i = 0; i < buttons.length; i++) {
            if (i !== correct && removed < 2) {
                buttons[i].style.visibility = "hidden";
                removed++;
            }
        }
        document.getElementById("btn-50").disabled = true;
        document.getElementById("btn-50").style.opacity = "0.5";
    }

    function withdraw() {
        alert("انسحبت بمبلغ: " + score + " ريال.");
        location.reload();
    }

    loadQuestion();
</script>

</body>
</html>
